<!DOCTYPE html>
<html>
    <head>
        <title>india mapping</title>
        <link rel="icon" href="india.png">
        <style>
            p {
                font-family: Arial;
                font-weight: bold;
                font-size: x-large;
                margin: 0px;
                padding: 2px;
                text-align: center;
                line-height: 8px;
            }
            body{
                background-color: rgb(187, 218, 218);
            }


            .container {
                border-radius: 16px;
                box-shadow: 0px 15px 25px rgb(157, 153, 153);
                margin: auto;
                width:600px;
                padding: 20px;
                background-color: aliceblue;            }
        </style>
    </head>


    
    <body>
        <div class="container">
            <p>Map of India</p><br>
            <p>(Click on Individual states to know more)</p>
            <div class="map">
                <img src="india.png" usemap="#india">
                <map name="india">
                    <area shape="poly" coords="254,312,230,360,330,300,280,280" href="orrisa.html">
                </map>
            </div>
            </div>
    </body>
</html>
