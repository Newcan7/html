<html>

<body bgcolor="EDE47F" style="font-family:Times New Roman;">
    <form>
        <table align="center" cellpadding="5">
            <tr>
                <td colspan="2">
                    <center>
                        <h1><u>Registration Form</u></h1>
                    </center>
                </td>
            </tr>
            <tr>
                <td>First Name &emsp;&emsp;</td>
                <td><input type="text" size="30"></td>
            </tr>
            <tr>
                <td>Last Name</td>
                <td><input type="text" size="30"></td>
            </tr>
            <tr>
                <td>Nick Name</td>
                <td><input type="text" size="30"></td>
            </tr>
            <tr>
                <td>e-mail</td>
                <td><input type="email" size="30" required="required"></td>
            </tr>
            <tr>
                <td>Password</td>
                <td><input type="password" size="30" required="required"></td>
            </tr>
            <tr>
                <td>Date of Birth</td>
                <td><input type="text" size="30"></td>
            </tr>
            <tr>
                <td>Gender</td>
                <td><input type="radio">Male
                    <input type="radio">Female
                    <input type="radio">Others
                </td>
            </tr>
            <tr>
                <td>Mobile</td>
                <td><input type="text" size="30" placeholder="+91-xxxxxxxxxx"></td>
            </tr>
            <tr>
                <td>Address</td>
                <td><textarea cols="30" rows="5"></textarea></td>
            </tr>
            <tr>
                <td></td>
                <td>
                    <input type="submit"> &emsp;
                    <input type="reset">
                </td>
            </tr>
        </table>
    </form>
</body>

</html>
