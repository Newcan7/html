<html>
<head>
	<title>FRAMES EXAMPLE</title>
	</head>
	<frameset rows="10%,80%,10%">
		<frame src="1.html">
		<frameset cols="100,*,100">
			<frame src="2.html">
			<frameset rows="50%,50%">
				<frame src="3.html">
				<frame src="6.html">
			</frameset>
		<frame src="5.html">
	</frameset>
	<frame src="9.html">
	<noframes>
	<body>
	<p>Alternate content</p>
	</body>
	</noframes>
	</frameset>
</html>
