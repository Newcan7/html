<html>
<body>
	<h1>The iframe element + CSS</h1>
	<p>An iframe with default borders:</p>
	<iframe src="1.html" width="100%" height="300">
	</iframe>

	<p>An iframe with a thin black border:</p>
	<iframe src="2.html" width="100%" height="300" style="border:3px dashed yellow;">
	</iframe>

	<p>An iframe with no borders:</p>
	<iframe src="3.html" width="100%" height="300" style="border:none;">
	</iframe>

</body>
</html>
